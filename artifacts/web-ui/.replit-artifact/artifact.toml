kind = "web"
previewPath = "/"
title = "Web Automation Platform"
version = "1.0.0"
id = "artifacts/web-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20758

[services.development]
run = "pnpm --filter @workspace/web-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web-ui", "run", "build" ]
publicDir = "artifacts/web-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20758"
BASE_PATH = "/"
