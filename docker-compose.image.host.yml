# =============================================================
  # AutoOps — 拉取预构建镜像部署（host 网络模式）
  #
  # 所有容器使用 host 网络，无需端口映射，服务间直接通过
  # localhost 通信。适用于单机部署、避免 Docker 网络开销、
  # 或需要容器直接访问宿主机网络的场景。
  #
  # 使用方法：
  #   1. 下载此文件
  #   2. 同目录创建 .env，填入 POSTGRES_PASSWORD（必填）
  #      DASHBOARD_PASSWORD 可不填，首次访问会在浏览器里设置密码
  #   3. docker compose -f docker-compose.image.host.yml up -d
  #
  # 默认端口占用：
  #   - PostgreSQL: 5432
  #   - Browserless: 3000
  #   - CF Proxy: 7317
  #   - App (Web UI + API): 8080
  # =============================================================

  services:
    db:
      image: postgres:16-alpine
      network_mode: host
      environment:
        POSTGRES_USER: autoops
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
        POSTGRES_DB: autoops
        PGPORT: "5432"
      volumes:
        - pgdata:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U autoops -d autoops"]
        interval: 5s
        timeout: 5s
        retries: 20
        start_period: 120s
      restart: unless-stopped

    browserless:
      image: ghcr.io/browserless/chromium:latest
      network_mode: host
      environment:
        PORT: "3000"
        CONNECTION_TIMEOUT: "60000"
        MAX_CONCURRENT_SESSIONS: "5"
        DEFAULT_LAUNCH_ARGS: '["--disable-blink-features=AutomationControlled"]'
      healthcheck:
        test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/json/version || exit 1"]
        interval: 10s
        timeout: 5s
        retries: 6
        start_period: 30s
      restart: unless-stopped

    # ── CF Proxy（SeleniumBase UC — Cloudflare 绕过）────────────────────────────
    cf-proxy:
      image: ghcr.io/mulemew/webauto-cf-proxy:latest
      network_mode: host
      environment:
        PORT: "7317"
        CF_RECONNECT_TIME: "${CF_RECONNECT_TIME:-4}"
        SESSION_TIMEOUT_S: "1800"
        POOL_SIZE: "${POOL_SIZE:-1}"
      shm_size: 2g
      healthcheck:
        test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7317/health || exit 1"]
        interval: 15s
        timeout: 10s
        retries: 5
        start_period: 60s
      restart: unless-stopped

    app:
      image: ghcr.io/mulemew/webauto:latest
      network_mode: host
      environment:
        DATABASE_URL: ${DATABASE_URL:-postgresql://autoops:${POSTGRES_PASSWORD:-changeme}@127.0.0.1:5432/autoops}
        PORT: "8080"
        NODE_ENV: production
        DATA_DIR: /app/data
        SESSION_SECRET: ${SESSION_SECRET:-}
        ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
        DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
        BROWSERLESS_URL: "ws://127.0.0.1:3000"
        BROWSER_PROVIDER: "${BROWSER_PROVIDER:-playwright}"
        CF_PROXY_URL: "http://127.0.0.1:7317"
      volumes:
        - autoops_data:/app/data
      depends_on:
        db:
          condition: service_healthy
        browserless:
          condition: service_healthy
        cf-proxy:
          condition: service_healthy
      restart: unless-stopped

  volumes:
    pgdata:
    autoops_data:
  