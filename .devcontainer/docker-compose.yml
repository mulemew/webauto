services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://autoops:devpassword@db:5432/autoops
      NODE_ENV: development
      DATA_DIR: /workspace/.devcontainer/data
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    depends_on:
      db:
        condition: service_healthy
    network_mode: service:db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autoops
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: autoops
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoops -d autoops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
